<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wi-Fi QR Generator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <img src="/static/wifi.svg" class="wifi-img" alt="WiFi illustration" />
      <h1>WiFi QR Generator</h1>

      <form id="wifi-form">
        <input type="text" name="ssid" placeholder="SSID" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <select name="security" required>
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">No password</option>
        </select>
        <button type="submit">Generate QR</button>
      </form>

      <div class="loading" id="loading">
        <img src="/static/loading.svg" alt="Loading..." />
      </div>

      <div id="qr-container">
        <img id="qr" alt="QR Code" />
        <a id="download" download="wifi.png">Download QR</a>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
